<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery & Customer Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruuy+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kantumruuy Pro', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div id="loginContainer" class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full border border-gray-200">
        <h2 class="text-2xl font-bold text-center text-indigo-600 mb-6 flex items-center justify-center gap-2">
            🚚 Delivery & Customer Manager
        </h2>
        
        <div class="flex border-b border-gray-200 mb-6">
            <button class="w-1/2 pb-2 text-center font-semibold text-indigo-600 border-b-2 border-indigo-600">🔒 ចូលប្រើប្រាស់</button>
            <button class="w-1/2 pb-2 text-center font-semibold text-gray-400 cursor-not-allowed" disabled>📝 ចុះឈ្មោះ</button>
        </div>

        <div id="loginForm">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">ឈ្មោះអ្នកប្រើប្រាស់</label>
                <input type="text" id="loginUser" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500" placeholder="បញ្ចូលឈ្មោះ (admin)">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">លេខសម្ងាត់</label>
                <input type="password" id="loginPass" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500" placeholder="បញ្ចូលលេខសម្ងាត់">
            </div>
            <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition flex items-center justify-center gap-2">
                🔑 ចូលប្រើប្រាស់
            </button>
        </div>
    </div>

    <div id="appContainer" class="hidden w-full max-w-4xl bg-white p-6 rounded-xl shadow-lg border border-gray-200 mt-4">
        <div class="flex flex-wrap justify-between items-center border-b pb-4 mb-4 gap-2">
            <div>
                <h1 class="text-xl font-bold text-gray-800">ប្រព័ន្ធគ្រប់គ្រងទិន្នន័យអតិថិជន និងការដឹកជញ្ជូន</h1>
                <div class="flex items-center gap-2 mt-1 text-sm text-gray-600">
                    <span>គណនី៖ <strong id="userDisplay" class="text-indigo-600">...</strong></span>
                    <span class="bg-purple-100 text-purple-700 text-xs px-2 py-0.5 rounded-full font-medium">Admin</span>
                    <span id="syncStatus" class="text-[10px] bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded border border-yellow-300">🔄 កំពុងត្រៀម...</span>
                </div>
            </div>
            <button onclick="handleLogout()" class="bg-red-500 text-white px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-red-600 transition">
                🚪 ចាកចេញ
            </button>
        </div>

        <div class="p-8 text-center border-2 border-dashed border-gray-200 rounded-xl bg-gray-50">
            <p class="text-gray-500">👋 ស្វាគមន៍មកកាន់ប្រព័ន្ធគ្រប់គ្រង! ទិន្នន័យអតិថិជនរបស់អ្នកត្រូវបានភ្ជាប់ជាមួយ Google Sheets រួចរាល់។</p>
            <p class="text-xs text-gray-400 mt-2">ប្រព័ន្ធដំណើរការបានរលូនទាំងនៅលើទូរស័ព្ទ និងកុំព្យូទ័រ</p>
        </div>
    </div>

    <script>
        // 🔗 នេះជា Link Apps Script Web App របស់អ្នកដែលបានអាប់ដេតរួចរាល់
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwe1s4QDH8Ti_NUIwd2o2BwaHyY_GRLVTG_Hz19mrVkyhnhaP1XQQQtuo1Xbkj6qkQFLg/exec"; 

        let currentCoordinates = "";
        let currentPage = 1;
        let rowsPerPage = 5; 
        let currentUserRole = "Admin"; 

        // ដំណើរការស្វ័យប្រវត្តនៅពេល App បើកភ្លាម
        window.onload = function() {
            // ទាញទិន្នន័យពី Sheets មកទុកក្នុងម៉ាស៊ីនជាមុន
            fetchInvoicesFromGoogleSheets();
        };

        // === 🔑 មុខងារ LOGIN (ដោះស្រាយបញ្ហាចុចប៊ូតុងមិនដើរ) ===
        function handleLogin() {
            const userInput = document.getElementById('loginUser').value.trim();
            const passInput = document.getElementById('loginPass').value.trim();
            
            if (!userInput || !passInput) {
                alert("សូមបញ្ចូលឈ្មោះអ្នកប្រើប្រាស់ និងលេខសម្ងាត់!");
                return;
            }

            // ឆែកត្រួតពិនិត្យ (admin / 123456)
            if (userInput.toLowerCase() === "admin" && passInput === "123456") {
                currentUserRole = "Admin";
                
                // បិទផ្ទាំង Login និងបើកផ្ទាំង App ធំ
                document.getElementById('loginContainer').classList.add('hidden');
                document.getElementById('appContainer').classList.remove('hidden');
                
                // បង្ហាញឈ្មោះនៅលើ Header
                document.getElementById('userDisplay').innerText = userInput;
                
                // អាប់ដេតទិន្នន័យទៅក្នុងតារាង
                if (typeof renderInvoices === "function") {
                    renderInvoices();
                }
            } else {
                alert("ឈ្មោះអ្នកប្រើប្រាស់ ឬលេខសម្ងាត់មិនត្រឹមត្រូវឡើយ!");
            }
        }

        // === 🚪 មុខងារ LOGOUT ===
        function handleLogout() {
            document.getElementById('loginContainer').classList.remove('hidden');
            document.getElementById('appContainer').classList.add('hidden');
            document.getElementById('loginUser').value = "";
            document.getElementById('loginPass').value = "";
        }

        // === ១. មុខងារទាញទិន្នន័យពី Google Sheets ===
        async function fetchInvoicesFromGoogleSheets() {
            if (!SCRIPT_URL) return;
            
            const statusBox = document.getElementById('syncStatus');
            if (statusBox) {
                statusBox.innerHTML = "🔄 កំពុងទាញទិន្នន័យ...";
                statusBox.className = "text-[10px] bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded border border-yellow-300";
            }
            
            try {
                const response = await fetch(SCRIPT_URL + "?action=read");
                const data = await response.json();
                if (data && Array.isArray(data)) {
                    localStorage.setItem('invoices', JSON.stringify(data));
                    
                    if (typeof renderInvoices === "function") {
                        renderInvoices();
                    }
                    
                    if (statusBox) {
                        statusBox.innerHTML = "✅ Google Sheets Sync";
                        statusBox.className = "text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded border border-green-300";
                    }
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                if (statusBox) {
                    statusBox.innerHTML = "❌ មិនអាចទាញទិន្នន័យបាន";
                    statusBox.className = "text-[10px] bg-red-100 text-red-700 px-2 py-0.5 rounded border border-red-300";
                }
            }
        }

        // === ២. មុខងារផ្ញើទិន្នន័យទៅរក្សាទុកនៅលើ Google Sheets ===
        async function syncToGoogleSheets(actionType, invoiceData) {
            if (!SCRIPT_URL) return;
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: actionType, data: invoiceData })
                });
                setTimeout(fetchInvoicesFromGoogleSheets, 1500);
            } catch (error) {
                console.error("Error syncing to Google Sheets:", error);
            }
        }
    </script>
</body>
</html>
