<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery & Customer Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kantumruuy+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kantumruuy Pro', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-2 sm:p-4">

    <div id="loginContainer" class="bg-white p-6 sm:p-8 rounded-xl shadow-lg max-w-md w-full border border-gray-200 mx-auto mt-10">
        <h2 class="text-xl sm:text-2xl font-bold text-center text-indigo-600 mb-6 flex items-center justify-center gap-2">
            🚚 Delivery & Customer Manager
        </h2>
        
        <div class="flex border-b border-gray-200 mb-6">
            <button class="w-1/2 pb-2 text-center font-semibold text-indigo-600 border-b-2 border-indigo-600">🔒 ចូលប្រើប្រាស់</button>
            <button class="w-1/2 pb-2 text-center font-semibold text-gray-400 cursor-not-allowed" disabled>📝 ចុះឈ្មោះ</button>
        </div>

        <div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">ឈ្មោះអ្នកប្រើប្រាស់</label>
                <input type="text" id="loginUser" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500" placeholder="admin">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">លេខសម្ងាត់</label>
                <input type="password" id="loginPass" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-indigo-500" placeholder="123456">
            </div>
            <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition flex items-center justify-center gap-2">
                🔑 ចូលប្រើប្រាស់
            </button>
        </div>
    </div>

    <div id="appContainer" class="hidden w-full max-w-4xl bg-white p-4 sm:p-6 rounded-xl shadow-lg border border-gray-200 mx-auto mt-4">
        <div class="flex flex-wrap justify-between items-center border-b pb-4 mb-4 gap-2">
            <div>
                <h1 class="text-lg sm:text-xl font-bold text-gray-800">ប្រព័ន្ធគ្រប់គ្រងទិន្នន័យអតិថិជន និងការដឹកជញ្ជូន</h1>
                <div class="flex flex-wrap items-center gap-2 mt-1 text-xs sm:text-sm text-gray-600">
                    <span>គណនី៖ <strong id="userDisplay" class="text-indigo-600">...</strong></span>
                    <span class="bg-purple-100 text-purple-700 text-[10px] sm:text-xs px-2 py-0.5 rounded-full font-medium">Admin</span>
                    <span id="syncStatus" class="text-[10px] bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded border border-yellow-300">🔄 កំពុងត្រៀម...</span>
                </div>
            </div>
            <button onclick="handleLogout()" class="bg-red-500 text-white px-3 py-1.5 rounded-lg text-xs sm:text-sm font-medium hover:bg-red-600 transition">
                🚪 ចាកចេញ
            </button>
        </div>

        <div class="mt-4">
            <h3 class="text-md font-bold text-gray-700 mb-2">📋 បញ្ជីទិន្នន័យពី Google Sheets</h3>
            <div class="overflow-x-auto border border-gray-200 rounded-lg">
                <table class="min-w-full divide-y divide-gray-200 text-sm">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ល.រ</th>
                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ឈ្មោះអតិថិជន</th>
                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">លេខទូរស័ព្ទ</th>
                            <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ស្ថានភាពដឹកជញ្ជូន</th>
                        </tr>
                    </thead>
                    <tbody id="invoiceTableBody" class="bg-white divide-y divide-gray-200">
                        <tr>
                            <td colspan="4" class="px-4 py-4 text-center text-gray-400">🔄 កំពុងរង់ចាំទាញទិន្នន័យ...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 🔗 ដំណភ្ជាប់ Google Apps Script Web App របស់អ្នក
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwe1s4QDH8Ti_NUIwd2o2BwaHyY_GRLVTG_Hz19mrVkyhnhaP1XQQQtuo1Xbkj6qkQFLg/exec"; 

        let currentUserRole = "Admin"; 

        // ដំណើរការដំបូងពេលបើកទំព័រ App
        window.onload = function() {
            // ព្យាយាមទាញទិន្នន័យទុកជាមុន
            fetchInvoicesFromGoogleSheets();
        };

        // === 🔑 មុខងារ LOGIN (កែសម្រួលដោះស្រាយការគាំង) ===
        function handleLogin() {
            const userInput = document.getElementById('loginUser').value.trim();
            const passInput = document.getElementById('loginPass').value.trim();
            
            if (!userInput || !passInput) {
                alert("សូមបញ្ចូលឈ្មោះអ្នកប្រើប្រាស់ និងលេខសម្ងាត់!");
                return;
            }

            if (userInput.toLowerCase() === "admin" && passInput === "123456") {
                currentUserRole = "Admin";
                
                // បិទផ្ទាំង Login និងបង្ហាញផ្ទាំង App ធំ
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('appContainer').classList.remove('hidden');
                document.getElementById('userDisplay').innerText = userInput;
                
                // ហៅបង្ហាញទិន្នន័យឡើងវិញ
                renderInvoices();
            } else {
                alert("ឈ្មោះអ្នកប្រើប្រាស់ ឬលេខសម្ងាត់មិនត្រឹមត្រូវឡើយ!");
            }
        }

        // === 🚪 មុខងារ LOGOUT ===
        function handleLogout() {
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('appContainer').classList.add('hidden');
            document.getElementById('loginUser').value = "";
            document.getElementById('loginPass').value = "";
        }

        // === 🔄 មុខងារបង្ហាញទិន្នន័យទៅក្នុងតារាង (បង្កើតការពារកុំឱ្យគាំង) ===
        function renderInvoices() {
            const tableBody = document.getElementById('invoiceTableBody');
            if (!tableBody) return;

            const localData = localStorage.getItem('invoices');
            if (!localData) {
                tableBody.innerHTML = `<tr><td colspan="4" class="px-4 py-4 text-center text-gray-400">📭 គ្មានទិន្នន័យក្នុងម៉ាស៊ីនឡើយ</td></tr>`;
                return;
            }

            const invoices = JSON.parse(localData);
            if (!Array.isArray(invoices) || invoices.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="4" class="px-4 py-4 text-center text-gray-400">📭 គ្មានទិន្នន័យបង្ហាញឡើយ</td></tr>`;
                return;
            }

            // បង្ហាញទិន្នន័យចូលក្នុងតារាង
            tableBody.innerHTML = "";
            invoices.forEach((item, index) => {
                // ឧបមាថាទិន្នន័យជួរនីមួយៗជា Array ឬ Object ផ្អែកលើ Apps Script
                const name = item[1] || item.name || "មិនស្គាល់";
                const phone = item[2] || item.phone || "មិនស្គាល់";
                const status = item[3] || item.status || "កំពុងដំណើរការ";

                tableBody.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="px-4 py-2 border-b text-gray-600">${index + 1}</td>
                        <td class="px-4 py-2 border-b font-medium text-gray-800">${name}</td>
                        <td class="px-4 py-2 border-b text-gray-600">${phone}</td>
                        <td class="px-4 py-2 border-b"><span class="bg-blue-100 text-blue-800 text-xs px-2 py-0.5 rounded">${status}</span></td>
                    </tr>
                `;
            });
        }

        // === ១. មុខងារទាញទិន្នន័យពី Google Sheets ===
        async function fetchInvoicesFromGoogleSheets() {
            if (!SCRIPT_URL) return;
            
            const statusBox = document.getElementById('syncStatus');
            if (statusBox) {
                statusBox.innerHTML = "🔄 កំពុងទាញទិន្នន័យ...";
                statusBox.className = "text-[10px] bg-yellow-100 text-yellow-700 px-2 py-0.5 rounded border border-yellow-300";
            }
            
            try {
                const response = await fetch(SCRIPT_URL + "?action=read");
                const data = await response.json();
                if (data && Array.isArray(data)) {
                    // រក្សាទុកទិន្នន័យក្នុង LocalStorage របស់ទូរស័ព្ទ
                    localStorage.setItem('invoices', JSON.stringify(data));
                    
                    // ហៅបង្ហាញទៅក្នុងតារាង
                    renderInvoices();
                    
                    if (statusBox) {
                        statusBox.innerHTML = "✅ Google Sheets Sync";
                        statusBox.className = "text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded border border-green-300";
                    }
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                if (statusBox) {
                    statusBox.innerHTML = "❌ មិនអាចទាញទិន្នន័យបាន";
                    statusBox.className = "text-[10px] bg-red-100 text-red-700 px-2 py-0.5 rounded border border-red-300";
                }
                // បើទោះជាមិនអាចទាញថ្មីបាន ក៏បង្ហាញទិន្នន័យចាស់ដែលមានស្រាប់ការពារគាំង
                renderInvoices();
            }
        }
    </script>
</body>
</html>
